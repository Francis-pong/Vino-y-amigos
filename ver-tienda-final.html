<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinum & Amigos (IPL) - Tienda de Vinos</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --burgundy: #6B1F3A;
            --gold: #D4AF37;
            --cream: #F5F1E8;
            --dark: #2C1810;
            --light-burgundy: #8B3952;
            --shadow: rgba(107, 31, 58, 0.15);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, #E8DCC8 100%);
            color: var(--dark);
            min-height: 100vh;
        }

        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' /%3E%3C/svg%3E");
            z-index: 1000;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: linear-gradient(135deg, var(--burgundy) 0%, var(--light-burgundy) 100%);
            padding: 1.5rem 0;
            box-shadow: 0 4px 20px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .cart-button {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .cart-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
            background: #E5C048;
        }

        .cart-count {
            background: var(--burgundy);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .hero {
            text-align: center;
            padding: 4rem 0 3rem;
            animation: fadeIn 0.8s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--burgundy);
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--dark);
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto;
        }

        .filters {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 2rem 0;
            flex-wrap: wrap;
            animation: fadeIn 0.8s ease-out 0.5s both;
        }

        .filter-btn {
            background: white;
            border: 2px solid var(--burgundy);
            color: var(--burgundy);
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--burgundy);
            color: rgb(201, 37, 37);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem 0;
            animation: fadeIn 0.8s ease-out 0.7s both;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 5px 20px var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .product-card.featured {
            background: linear-gradient(135deg, #FFF9F0 0%, #FFFFFF 100%);
            border: 2px solid var(--gold);
        }

        .featured-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, var(--gold), #E5C048);
            color: var(--dark);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 2px 10px rgba(212, 175, 55, 0.4);
            z-index: 10;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--burgundy), var(--gold));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 30px var(--shadow);
        }

        .product-card:hover::before {
            transform: scaleX(1);
        }

        .product-image {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, var(--cream), #E0D4C0);
            border-radius: 10px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.05);
        }

        .product-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(107, 31, 58, 0.2), transparent);
            pointer-events: none;
        }

        .product-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--burgundy);
            margin-bottom: 0.5rem;
        }

        .product-type {
            color: var(--gold);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .product-description {
            color: var(--dark);
            opacity: 0.7;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
        }

        .price {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--burgundy);
            font-family: 'Playfair Display', serif;
        }

        .add-to-cart-btn {
            background: var(--burgundy);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .add-to-cart-btn:hover {
            background: var(--light-burgundy);
            transform: scale(1.05);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            animation: fadeIn 0.3s ease;
        }

        .modal {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--cream);
        }

        .modal-header h2 {
            font-family: 'Playfair Display', serif;
            color: var(--burgundy);
            font-size: 2rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--dark);
            line-height: 1;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .close-btn:hover {
            transform: rotate(90deg);
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid var(--cream);
            align-items: center;
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            background: var(--cream);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .cart-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-info h4 {
            color: var(--burgundy);
            font-family: 'Playfair Display', serif;
            margin-bottom: 0.3rem;
        }

        .cart-item-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 0.5rem;
        }

        .quantity-btn {
            background: var(--burgundy);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .quantity-btn:hover {
            background: var(--light-burgundy);
            transform: scale(1.1);
        }

        .quantity {
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        .remove-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .remove-btn:hover {
            background: #c82333;
        }

        .cart-total {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--burgundy);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-total h3 {
            font-family: 'Playfair Display', serif;
            color: var(--burgundy);
            font-size: 1.5rem;
        }

        .total-price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--burgundy);
            font-family: 'Playfair Display', serif;
        }

        .checkout-btn {
            width: 100%;
            margin-top: 1.5rem;
            background: linear-gradient(135deg, var(--burgundy), var(--light-burgundy));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--shadow);
        }

        .empty-cart {
            text-align: center;
            padding: 3rem;
            color: var(--dark);
            opacity: 0.6;
        }

        .empty-cart-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .order-form {
            margin-top: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--burgundy);
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--cream);
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--burgundy);
        }

        .success-message {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .success-message h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        /* ===== TABS ===== */
        .main-tabs {
            display: flex;
            justify-content: center;
            gap: 0;
            margin: 2rem 0 0;
            border-bottom: 2px solid var(--burgundy);
        }

        .tab-btn {
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            padding: 14px 36px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--dark);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: -2px;
            letter-spacing: 0.5px;
        }

        .tab-btn:hover { color: var(--burgundy); }

        .tab-btn.active {
            color: var(--burgundy);
            border-bottom: 3px solid var(--burgundy);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }

        /* ===== WINE CONFIGURATOR ===== */
        .configurator-wrap {
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 0 60px;
        }

        .cfg-progress {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 36px;
        }

        .cfg-dot {
            width: 36px;
            height: 5px;
            border-radius: 3px;
            background: #ddd;
            transition: all 0.4s ease;
        }

        .cfg-dot.active { background: var(--burgundy); }
        .cfg-dot.done { background: var(--gold); }

        .cfg-step { display: none; animation: fadeIn 0.4s ease; }
        .cfg-step.active { display: block; }

        .cfg-step-num {
            font-size: 0.72rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 600;
        }

        .cfg-step-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 2rem);
            color: var(--burgundy);
            margin: 6px 0 8px;
        }

        .cfg-step-desc {
            color: var(--dark);
            opacity: 0.65;
            font-size: 0.9rem;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .cfg-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 28px;
        }

        .cfg-card {
            background: white;
            border: 2px solid #e0d4c0;
            border-radius: 14px;
            padding: 18px 14px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(107,31,58,0.06);
        }

        .cfg-card:hover {
            border-color: var(--light-burgundy);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(107,31,58,0.12);
        }

        .cfg-card.selected {
            border-color: var(--burgundy);
            background: linear-gradient(135deg, #FFF0F4, #fff);
            box-shadow: 0 4px 16px rgba(107,31,58,0.18);
        }

        .cfg-card-emoji { font-size: 2rem; display: block; margin-bottom: 8px; }
        .cfg-card-name { font-weight: 600; color: var(--dark); font-size: 0.9rem; }
        .cfg-card-note { font-size: 0.72rem; color: #888; margin-top: 4px; line-height: 1.3; }

        .cfg-btn-row { display: flex; gap: 12px; }

        .cfg-btn {
            padding: 13px 26px;
            border: none;
            border-radius: 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cfg-btn-primary {
            background: var(--burgundy);
            color: white;
            flex: 1;
        }

        .cfg-btn-primary:hover { background: var(--light-burgundy); transform: translateY(-1px); }
        .cfg-btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

        .cfg-btn-secondary {
            background: transparent;
            color: var(--burgundy);
            border: 2px solid var(--burgundy);
        }

        .cfg-btn-secondary:hover { background: var(--cream); }

        /* Result card */
        .cfg-result-card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 5px 25px rgba(107,31,58,0.1);
            margin-bottom: 24px;
            border: 1px solid #e8dcc8;
        }

        .cfg-result-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--burgundy);
            margin-bottom: 18px;
            font-style: italic;
        }

        .cfg-result-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0e8d8;
            font-size: 0.9rem;
        }

        .cfg-result-row:last-child { border-bottom: none; }
        .cfg-result-label { color: #888; }
        .cfg-result-value { font-weight: 600; color: var(--dark); }

        .cfg-highlight-row {
            background: linear-gradient(135deg, #FFF0F4, #FFF8F0);
            margin: 8px -28px;
            padding: 14px 28px;
            border: none !important;
        }

        .cfg-highlight-row .cfg-result-label { color: var(--dark); font-weight: 500; }
        .cfg-highlight-row .cfg-result-value { color: var(--burgundy); font-size: 1rem; font-weight: 700; }

        .cfg-timeline { margin: 18px 0; }
        .cfg-timeline-labels { display: flex; justify-content: space-between; font-size: 0.72rem; color: #aaa; margin-bottom: 6px; }
        .cfg-timeline-track { height: 7px; background: #f0e8d8; border-radius: 4px; overflow: hidden; }
        .cfg-timeline-fill { height: 100%; background: linear-gradient(90deg, var(--burgundy), var(--gold)); border-radius: 4px; animation: cfgFill 1.2s ease forwards; width: 0; }
        @keyframes cfgFill { to { width: var(--fw); } }

        .cfg-info-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #FFF8E7;
            border: 1px solid #e8c96e;
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 0.8rem;
            color: #8a6200;
            margin-bottom: 20px;
        }

        .cfg-confirm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .cfg-btn-accept {
            background: linear-gradient(135deg, #2D6A4F, #40916C);
            color: white;
            padding: 16px;
            font-size: 0.95rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .cfg-btn-accept:hover { filter: brightness(1.1); transform: translateY(-1px); }

        .cfg-btn-modify {
            background: transparent;
            color: var(--burgundy);
            border: 2px solid var(--burgundy);
            padding: 16px;
            font-size: 0.95rem;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .cfg-btn-modify:hover { background: #fff0f4; }

        .cfg-success {
            text-align: center;
            padding: 50px 20px;
        }

        .cfg-success-icon { font-size: 4rem; display: block; margin-bottom: 16px; animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        .cfg-success-title { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--burgundy); margin-bottom: 12px; }
        .cfg-success-msg { color: #777; line-height: 1.7; max-width: 420px; margin: 0 auto; }

        .cfg-order-id {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 22px;
            border: 2px solid var(--gold);
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--burgundy);
            font-weight: 600;
            letter-spacing: 0.08em;
        }

        @media (max-width: 768px) {
            .cfg-confirm-grid { grid-template-columns: 1fr; }
            .tab-btn { padding: 12px 14px; font-size: 0.8rem; }
        }

        /* ===== SUGERENCIAS & RESEÑAS ===== */
        .community-wrap {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 0 60px;
        }
        .community-header { text-align: center; margin-bottom: 36px; }
        .community-header h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem,4vw,2.4rem); color: var(--burgundy); margin-bottom: 8px; }
        .community-header p { color: var(--dark); opacity: 0.65; font-size: 0.95rem; line-height: 1.6; }

        .community-form-card {
            background: white;
            border-radius: 18px;

                address: ''
            });

                const existingItem = cart.find(item => item.id === wine.id);

                    setCart(cart.map(item => 
                        item.id === wine.id 
                            ? { ...item, quantity: item.quantity + 1 }
                            : item
                    ));
                } else {
                    setCart([...cart, { ...wine, quantity: 1 }]);
                }
            };

                setCart(cart.map(item => 
                    item.id === id 
                        ? { ...item, quantity: Math.max(0, item.quantity + delta) }
                        : item
                ).filter(item => item.quantity > 0));
            };

            const removeFromCart = (id) => {
                setCart(cart.filter(item => item.id !== id));
            };

                return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

                    setShowCart(false);
                    setCart([]);

                                  <p className="cfg-result-title">Vino de {cfgData.fruta} — {cfgData.dulzor}</p>
                                  <div className="cfg-result-row"><span className="cfg-result-label">Fruta base</span><span className="cfg-result-value">{cfgData.fruta}</span></div>
                                  <div className="cfg-result-row"><span className="cfg-result-label">Nivel de dulzor</span><span className="cfg-result-value">{cfgData.dulzor}</span></div>
                                  <div className="cfg-result-row"><span className="cfg-result-label">Grado alcohólico</span><span className="cfg-result-value">{cfgData.alcohol}</span></div>
                                  <div className="cfg-result-row"><span className="cfg-result-label">Maduración</span><span className="cfg-result-value">{cfgData.maduracion}</span></div>
                                  <div className="cfg-result-row"><span className="cfg-result-label">Cantidad</span><span className="cfg-result-value">{cfgData.cantidad}</span></div>
                                  <div className="cfg-timeline">
                                    <div className="cfg-timeline-labels"><span>Inicio elaboración</span><span>{cfgResult.total} días totales</span></div>
                                    <div className="cfg-timeline-track">
                                      <div className="cfg-timeline-fill" style={{'--fw': Math.min(100, (cfgResult.total / 180) * 100) + '%'}}></div>
                                    </div>
                                    <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.7rem',color:'#aaa',marginTop:'5px'}}>
                                      <span>Fermentación</span><span>Maduración</span><span>Entrega</span>
                                    </div>
                                  </div>
                                  <div className="cfg-result-row cfg-highlight-row">
                                    <span className="cfg-result-label">📅 Fecha estimada de entrega</span>
                                    <span className="cfg-result-value">{cfgResult.fechaStr}</span>
                                  </div>
                                </div>
                                <p style={{fontSize:'0.8rem',color:'#999',marginBottom:'16px',fontStyle:'italic'}}>
                                  * La fecha es estimada. Factores climáticos y de producción pueden variar el tiempo final.
                                </p>
                                <div className="cfg-confirm-grid">
                                  <button className="cfg-btn-accept" onClick={() => setCfgDone(true)}>✅ Sí, deseo continuar</button>
                                  <button className="cfg-btn-modify" onClick={cfgReset}>🔄 Modificar selección</button>
                                </div>
                              </div>
                            )}

                            {/* Step 7: Éxito */}
                            {cfgDone && (
                              <div className="cfg-step active">
                                <div className="cfg-success">
                                  <span className="cfg-success-icon">🍾</span>
                                  <h2 className="cfg-success-title">¡Pedido Registrado!</h2>
                                  <p className="cfg-success-msg">Tu vino personalizado de <strong>{cfgData.fruta}</strong> ha sido registrado. Nos pondremos en contacto contigo pronto para coordinar los detalles.</p>
                                  <div className="cfg-order-id">Orden #{Math.floor(Math.random() * 90000) + 10000}</div>
                                  <br/><br/>
                                  <button className="cfg-btn cfg-btn-secondary" style={{marginTop:'16px'}} onClick={cfgReset}>Crear otro vino</button>
                                </div>
                              </div>
                            )}

                          </div>
                        </div>

                        {/* ===== SUGERENCIAS ===== */}
                        <div className={`tab-content ${mainTab === 'sugerencias' ? 'active' : ''}`}>
                          <div className="community-wrap">
                            <div className="community-header">
                              <h2>💡 Sugiere tu Vino Ideal</h2>
                              <p>¿Tienes una idea para un vino que nos gustaría elaborar? Cuéntanos tu visión y lo consideraremos en nuestra próxima producción artesanal.</p>
                            </div>

                            <div className="community-form-card">
                              <h3>Comparte tu idea</h3>
                              <p className="subtitle">Tu sugerencia será revisada por nuestro equipo de producción</p>

                              {sugSent ? (
                                <div className="sent-banner">
                                  <span className="sent-icon">🍇</span>
                                  <h4>¡Gracias por tu idea!</h4>
                                  <p>Tu sugerencia ha sido enviada. La revisaremos con mucho cariño.</p>
                                </div>
                              ) : (
                                <>
                                  <div className="form-field">
                                    <label>Tu nombre *</label>
                                    <input type="text" placeholder="Ej. Ana Pérez" value={sugForm.nombre} onChange={e => setSugForm({...sugForm, nombre: e.target.value})} />
                                  </div>
                                  <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'14px'}}>
                                    <div className="form-field">
                                      <label>Fruta base preferida</label>
                                      <select value={sugForm.fruta} onChange={e => setSugForm({...sugForm, fruta: e.target.value})}>
                                        <option value="">-- Selecciona --</option>
                                        <option>Uva 🍇</option>
                                        <option>Manzana 🍎</option>
                                        <option>Piña 🍍</option>
                                        <option>Fresa 🍓</option>
                                        <option>Durazno 🍑</option>
                                        <option>Otra / combinación</option>
                                      </select>
                                    </div>
                                    <div className="form-field">
                                      <label>Tipo de vino que imaginas</label>
                                      <select value={sugForm.tipo} onChange={e => setSugForm({...sugForm, tipo: e.target.value})}>
                                        <option value="">-- Selecciona --</option>
                                        <option>Seco y ligero</option>
                                        <option>Semi-dulce afrutado</option>
                                        <option>Dulce y aromático</option>
                                        <option>Espumoso</option>
                                        <option>Rosado</option>
                                      </select>
                                    </div>
                                  </div>
                                  <div className="form-field">
                                    <label>Describe tu idea de vino *</label>
                                    <textarea rows="5" placeholder="Ej: Me gustaría un vino de fresa con notas de vainilla, semi-dulce, que sea perfecto para una cena romántica. Sería genial si pudieran añadir un toque de cardamomo..." value={sugForm.notas} onChange={e => setSugForm({...sugForm, notas: e.target.value})} />
                                  </div>
                                  <div className="form-field">
                                    <label>Correo o teléfono (opcional, para notificarte si la producimos)</label>
                                    <input type="text" placeholder="📧 tuemail@ejemplo.com  ó  📱 809-xxx-xxxx" value={sugForm.contacto} onChange={e => setSugForm({...sugForm, contacto: e.target.value})} />
                                  </div>
                                  <button className="form-submit-btn" disabled={!sugForm.nombre || !sugForm.notas} onClick={submitSug}>
                                    🍷 Enviar mi sugerencia
                                  </button>
                                </>
                              )}
                            </div>

                            <div style={{background:'white',borderRadius:'14px',padding:'22px 28px',border:'1px solid #e8dcc8',opacity:0.85}}>
                              <p style={{fontSize:'0.85rem',color:'#888',lineHeight:'1.7'}}>
                                🌿 <strong style={{color:'var(--burgundy)'}}>¿Sabías que?</strong> Todos nuestros vinos artesanales son elaborados en pequeñas tandas en el Instituto Politécnico Loyola. Tu idea podría convertirse en la próxima edición especial de Vinum & Amigos.
                              </p>
                            </div>
                          </div>
                        </div>

                        {/* ===== RESEÑAS ===== */}
                        <div className={`tab-content ${mainTab === 'resenas' ? 'active' : ''}`}>
                          <div className="community-wrap">
                            <div className="community-header">
                              <h2>⭐ Opiniones de la Comunidad</h2>
                              <p>Dinos qué piensas de Vinum & Amigos. Tu opinión nos ayuda a mejorar y motiva a nuestro equipo.</p>
                            </div>

                            <div className="community-form-card">
                              <h3>Deja tu reseña</h3>
                              <p className="subtitle">¿Elogio, crítica constructiva o simplemente quieres contarnos algo? ¡Todo es bienvenido!</p>

                              {revSent ? (
                                <div className="sent-banner">
                                  <span className="sent-icon">✨</span>
                                  <h4>¡Gracias por tu opinión!</h4>
                                  <p>Tu reseña ya es visible para toda la comunidad.</p>
                                </div>
                              ) : (
                                <>
                                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px'}}>
                                    <div className="form-field">
                                      <label>Tu nombre *</label>
                                      <input type="text" placeholder="Ej. Luis M." value={revForm.nombre} onChange={e => setRevForm({...revForm, nombre: e.target.value})} />
                                    </div>
                                    <div className="form-field">
                                      <label>Tipo de opinión</label>
                                      <select value={revForm.tipo} onChange={e => setRevForm({...revForm, tipo: e.target.value})}>
                                        <option value="elogio">🌟 Elogio</option>
                                        <option value="critica">📝 Crítica constructiva</option>
                                        <option value="neutral">💬 Comentario general</option>
                                      </select>
                                    </div>
                                  </div>
                                  <div className="form-field">
                                    <label>Calificación *</label>
                                    <div className="star-picker">
                                      {[1,2,3,4,5].map(n => (
                                        <button key={n} className={`star-btn ${revForm.estrellas >= n ? 'lit' : ''}`} onClick={() => setRevForm({...revForm, estrellas: n})}>⭐</button>
                                      ))}
                                      {revForm.estrellas > 0 && <span style={{alignSelf:'center',fontSize:'0.8rem',color:'#888',marginLeft:'8px'}}>{['','Muy malo','Malo','Regular','Bueno','Excelente'][revForm.estrellas]}</span>}
                                    </div>
                                  </div>
                                  <div className="form-field">
                                    <label>Tu comentario *</label>
                                    <textarea rows="4" placeholder="Cuéntanos tu experiencia con nuestros vinos, el servicio, la selección de productos, o cualquier cosa que quieras compartir..." value={revForm.texto} onChange={e => setRevForm({...revForm, texto: e.target.value})} />
                                  </div>
                                  <button className="form-submit-btn" disabled={!revForm.nombre || !revForm.texto || revForm.estrellas === 0} onClick={submitRev}>
                                    ⭐ Publicar reseña
                                  </button>
                                </>
                              )}
                            </div>

                            <div className="section-divider">
                              <hr/><span>Opiniones de la comunidad ({reviews.length})</span><hr/>
                            </div>

                            <div className="reviews-list">
                              {reviews.length === 0 ? (
                                <div className="no-reviews">Aún no hay reseñas. ¡Sé el primero!</div>
                              ) : reviews.map(r => (
                                <div key={r.id} className="review-card">
                                  <div className="review-top">
                                    <div>
                                      <div className="review-author">{r.nombre}</div>
                                      <div className="review-stars">{'⭐'.repeat(r.estrellas)}{'☆'.repeat(5 - r.estrellas)}</div>
                                    </div>
                                    <span className={`review-type-badge ${r.tipo === 'elogio' ? 'badge-elogio' : r.tipo === 'critica' ? 'badge-critica' : 'badge-neutral'}`}>
                                      {r.tipo === 'elogio' ? '🌟 Elogio' : r.tipo === 'critica' ? '📝 Crítica' : '💬 Comentario'}
                                    </span>
                                  </div>
                                  <p className="review-text">{r.texto}</p>
                                  <div className="review-date">📅 {r.fecha}</div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>

                    </div>

                    <footer style={{
                        background: 'linear-gradient(135deg, var(--burgundy) 0%, var(--light-burgundy) 100%)',
                        color: 'white',
                        padding: '3rem 0 2rem',
                        marginTop: '4rem',
                        textAlign: 'center'
                    }}>
                        <div className="app-container">
                            <h3 style={{
                                fontFamily: 'Playfair Display, serif',
                                fontSize: '2rem',
                                marginBottom: '1rem',
                                color: 'var(--gold)'
                            }}>
                                Vinum & Amigos
                            </h3>
                            <p style={{marginBottom: '1rem', opacity: '0.9', fontSize: '1.1rem'}}>
                                Instituto Politécnico Loyola (IPL)
                            </p>
                            <p style={{
                                fontSize: '1.1rem',
                                fontWeight: '600',
                                marginBottom: '0.5rem'
                            }}>
                                📧 vinumyamigos@ipl.edu.do
                            </p>
                            <p style={{opacity: '0.8', fontSize: '0.9rem', marginTop: '2rem'}}>
                                © 2026 Vinum & Amigos - IPL - Todos los derechos reservados
                            </p>
                        </div>
                    </footer>

                    {showCart && (
                        <div className="modal-overlay" onClick={() => setShowCart(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h2>Tu Carrito</h2>
                                    <button className="close-btn" onClick={() => setShowCart(false)}>×</button>
                                </div>

                                {cart.length === 0 ? (
                                    <div className="empty-cart">
                                        <div className="empty-cart-icon">🛒</div>
                                        <p>Tu carrito está vacío</p>
                                    </div>
                                ) : showCheckout ? (
                                    orderComplete ? (
                                        <div className="success-message">
                                            <div className="success-icon">✓</div>
                                            <h3>¡Pedido Recibido!</h3>
                                            <p>Gracias por tu compra. Te contactaremos pronto.</p>
                                            <p>Número de orden: #{Math.floor(Math.random() * 10000)}</p>
                                        </div>
                                    ) : (
                                        <form className="order-form" onSubmit={handleCheckout}>
                                            <h3 style={{marginBottom: '1rem', color: 'var(--burgundy)', fontFamily: 'Playfair Display'}}>Información de Entrega</h3>
                                            
                                            <div className="form-group">
                                                <label>Nombre Completo *</label>
                                                <input 
                                                    type="text" 
                                                    required
                                                    value={customerInfo.name}
                                                    onChange={e => setCustomerInfo({...customerInfo, name: e.target.value})}
                                                />
                                            </div>

                                            <div className="form-group">
                                                <label>Email *</label>
                                                <input 
                                                    type="email" 
                                                    required
                                                    value={customerInfo.email}
                                                    onChange={e => setCustomerInfo({...customerInfo, email: e.target.value})}
                                                />
                                            </div>

                                            <div className="form-group">
                                                <label>Teléfono *</label>
                                                <input 
                                                    type="tel" 
                                                    required
                                                    value={customerInfo.phone}
                                                    onChange={e => setCustomerInfo({...customerInfo, phone: e.target.value})}
                                                />
                                            </div>

                                            <div className="form-group">
                                                <label>Dirección de Entrega *</label>
                                                <textarea 
                                                    rows="3" 
                                                    required
                                                    value={customerInfo.address}
                                                    onChange={e => setCustomerInfo({...customerInfo, address: e.target.value})}
                                                ></textarea>
                                            </div>

                                            <div className="cart-total">
                                                <h3>Total:</h3>
                                                <span className="total-price">${getTotal()}</span>
                                            </div>

                                            <button type="submit" className="checkout-btn">
                                                Confirmar Pedido
                                            </button>

                                            <button 
                                                type="button" 
                                                onClick={() => setShowCheckout(false)}
                                                style={{
                                                    width: '100%',
                                                    marginTop: '0.5rem',
                                                    background: 'transparent',
                                                    color: 'var(--burgundy)',
                                                    border: '2px solid var(--burgundy)',
                                                    padding: '12px',
                                                    borderRadius: '30px',
                                                    cursor: 'pointer',
                                                    fontWeight: '600'
                                                }}
                                            >
                                                Volver al Carrito
                                            </button>
                                        </form>
                                    )
                                ) : (
                                    <>
                                        {cart.map(item => (
                                            <div key={item.id} className="cart-item">
                                                <div className="cart-item-image">
                                                    <img src={item.image} alt={item.name} />
                                                </div>
                                                <div className="cart-item-info">
                                                    <h4>{item.name}</h4>
                                                    <p style={{color: 'var(--gold)', fontSize: '0.9rem'}}>${item.price} c/u</p>
                                                    <div className="cart-item-controls">
                                                        <button 
                                                            className="quantity-btn"
                                                            onClick={() => updateQuantity(item.id, -1)}
                                                        >
                                                            −
                                                        </button>
                                                        <span className="quantity">{item.quantity}</span>
                                                        <button 
                                                            className="quantity-btn"
                                                            onClick={() => updateQuantity(item.id, 1)}
                                                        >
                                                            +
                                                        </button>
                                                        <button 
                                                            className="remove-btn"
                                                            onClick={() => removeFromCart(item.id)}
                                                        >
                                                            Eliminar
                                                        </button>
                                                    </div>
                                                </div>
                                                <div style={{fontWeight: '700', color: 'var(--burgundy)', fontSize: '1.2rem'}}>
                                                    ${item.price * item.quantity}
                                                </div>
                                            </div>
                                        ))}

                                        <div className="cart-total">
                                            <h3>Total:</h3>
                                            <span className="total-price">${getTotal()}</span>
                                        </div>

                                        <button 
                                            className="checkout-btn"
                                            onClick={() => setShowCheckout(true)}
                                        >
                                            Proceder al Checkout
                                        </button>
                                    </>
                                )}
                            </div>
                        </div>
                    )}
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
